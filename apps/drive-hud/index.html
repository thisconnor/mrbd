<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<title>Drive HUD</title>
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:600px; height:600px; overflow:hidden;
    background:#000; color:#fff;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro", "Helvetica Neue", system-ui, sans-serif;
    font-weight: 200;
    letter-spacing: -0.01em;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ——— Stage ——— */
  .stage { position:relative; width:600px; height:600px; }

  /* ——— Top bar: heading (left) + speed limit (right) ——— */
  .top {
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: 28px 36px 0 36px;
  }

  /* Compass */
  .compass {
    display:flex; align-items:center; gap:18px;
    padding-top: 10px;
  }
  .rose {
    width: 68px; height: 68px;
    border: 1.5px solid #fff;
    border-radius: 50%;
    position: relative;
    will-change: transform;
  }
  .rose::before {
    content:'N';
    position:absolute; top:-12px; left:50%;
    transform: translateX(-50%);
    font-size: 15px; font-weight: 500;
    background:#000; padding: 0 5px;
    letter-spacing: 0.05em;
  }
  .needle {
    position:absolute; top:7px; left:50%;
    width: 2px; height: 26px;
    background:#fff;
    transform: translateX(-50%);
  }
  .heading-txt {
    font-size: 30px; font-weight: 300;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    min-width: 110px;
  }

  /* Estimated g-force meter (top center) */
  .gmeter {
    position:absolute; top: 30px; left: 50%;
    transform: translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap: 8px;
  }
  .gdial {
    width: 68px; height: 68px;
    border: 1.5px solid #fff;
    border-radius: 50%;
    position: relative;
  }
  .gdial::before, .gdial::after {
    content:''; position:absolute; background: rgba(255,255,255,0.22);
  }
  .gdial::before { left:50%; top:9px; bottom:9px; width:1px; transform: translateX(-50%); }
  .gdial::after  { top:50%; left:9px; right:9px; height:1px; transform: translateY(-50%); }
  .gdot {
    position:absolute; top:50%; left:50%;
    width: 12px; height: 12px;
    border-radius: 50%;
    background:#fff;
    transform: translate(-50%, -50%);
    will-change: transform;
    transition: transform 280ms ease, background 200ms ease;
  }
  .g-txt {
    font-size: 24px; font-weight: 300;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .g-unit { font-size: 15px; font-weight: 400; opacity: 0.7; margin-left: 3px; }
  .gmeter.high .gdot { background: #ff4444; }
  .gmeter.high .g-txt { color: #ff4444; }

  /* Speed limit sign */
  .limit {
    width: 132px; height: 168px;
    border: 2.5px solid #fff;
    border-radius: 18px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 12px 6px 10px;
    transition: border-color 200ms ease, box-shadow 200ms ease;
  }
  .limit-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    line-height: 1.15;
    text-align:center;
    opacity: 0.95;
  }
  .limit-val {
    font-size: 76px;
    font-weight: 300;
    line-height: 1;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
    transition: color 200ms ease;
  }
  .limit.dim { border-color: rgba(255,255,255,0.25); }
  .limit.dim .limit-label,
  .limit.dim .limit-val { opacity: 0.35; }
  .limit.over {
    border-color: #ff4444;
    box-shadow: 0 0 32px rgba(255, 68, 68, 0.45);
  }
  .limit.over .limit-val { color: #ff4444; }

  /* ——— Center: speedometer ——— */
  .speed-wrap {
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%, -50%);
    text-align:center;
    line-height: 1;
  }
  .speed {
    font-size: 280px;
    font-weight: 100;
    letter-spacing: -0.06em;
    line-height: 0.9;
    font-variant-numeric: tabular-nums;
  }
  .speed-unit {
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.35em;
    margin-top: 18px;
    opacity: 0.85;
    text-indent: 0.35em; /* optical centering with letter-spacing */
  }
  .speed.over { color: #ff4444; }

  /* ——— Bottom: next feature ——— */
  .next {
    position:absolute;
    left:50%; bottom: 38px;
    transform: translateX(-50%);
    display:flex; align-items:center; gap:24px;
    padding: 20px 38px;
    border: 1.5px solid rgba(255,255,255,0.55);
    border-radius: 100px;
    transition: border-color 200ms ease, opacity 200ms ease;
  }
  .next.dim {
    border-color: rgba(255,255,255,0.18);
    opacity: 0.55;
  }
  .next-icon {
    font-size: 22px;
    width: 24px; text-align:center;
  }
  .next-stack { display:flex; flex-direction:column; gap:4px; }
  .next-distance {
    font-size: 36px;
    font-weight: 300;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .next-label {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.65;
    line-height: 1;
  }

  /* ——— Permission gate ——— */
  .gate {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: 32px;
    padding: 60px;
    text-align:center;
  }
  .gate h1 {
    font-size: 56px;
    font-weight: 100;
    letter-spacing: -0.03em;
  }
  .gate p {
    font-size: 17px;
    font-weight: 300;
    opacity: 0.7;
    line-height: 1.45;
    max-width: 460px;
  }
  .gate button {
    min-height: 88px;
    min-width: 220px;
    padding: 18px 44px;
    font-size: 22px;
    font-weight: 300;
    font-family: inherit;
    color: #fff;
    background: transparent;
    border: 1.5px solid #fff;
    border-radius: 100px;
    cursor: pointer;
    transition: background 150ms ease, box-shadow 150ms ease;
    letter-spacing: 0.02em;
  }
  .gate button:focus,
  .gate button:hover {
    outline: none;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 28px rgba(255,255,255,0.25);
  }
  .gate.error h1 { font-size: 36px; }
  .gate.error p { color: #ff8a8a; opacity: 1; }

  /* ——— Low-key menu button + menu ——— */
  .menu-btn {
    position:absolute; right: 28px; bottom: 30px;
    width: 54px; height: 54px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; background: rgba(0,0,0,0.35);
    border: 1.5px solid rgba(255,255,255,0.45);
    border-radius: 50%;
    opacity: 0.55; cursor: pointer;
    transition: opacity 150ms ease, background 150ms ease;
    z-index: 30;
  }
  .menu-btn:hover, .menu-btn:focus { opacity: 1; background: rgba(255,255,255,0.1); outline:none; }
  .menu {
    position:absolute; right: 28px; bottom: 94px;
    display:flex; flex-direction:column;
    background:#0a0a0a;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 16px; overflow:hidden;
    z-index: 31; min-width: 248px;
  }
  .menu-item {
    appearance:none; text-align:left;
    font:inherit; font-size: 20px; font-weight: 300; color:#fff;
    background: transparent; border:0;
    padding: 16px 22px; cursor:pointer;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .menu-item:last-child { border-bottom: 0; }
  .menu-item:hover, .menu-item:focus { background: rgba(255,255,255,0.08); outline:none; }

  /* ——— Search overlay ——— */
  .search {
    position:absolute; inset:0; z-index: 40;
    background:#000; display:flex; flex-direction:column;
    padding: 28px 30px 0;
  }
  .search-bar { display:flex; align-items:center; gap: 14px; }
  #searchInput {
    flex:1; min-width:0; font:inherit; font-size: 24px; font-weight: 300; color:#fff;
    background:#141414; border: 1.5px solid #444; border-radius: 14px; padding: 16px 18px;
  }
  #searchInput:focus { outline:none; border-color:#fff; }
  #searchInput::placeholder { color:#777; }
  #searchClose {
    flex:0 0 auto; width: 54px; height: 54px;
    font:inherit; font-size: 22px; color:#fff;
    background:transparent; border:1.5px solid #444; border-radius: 50%; cursor:pointer;
  }
  #searchClose:hover { background: rgba(255,255,255,0.08); }
  .search-results { margin-top: 18px; overflow-y:auto; scrollbar-width:none; }
  .search-results::-webkit-scrollbar { display:none; }
  .sr-item { padding: 16px 6px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor:pointer; }
  .sr-item:hover { background: rgba(255,255,255,0.05); }
  .sr-title { font-size: 21px; font-weight: 400; }
  .sr-sub { font-size: 15px; opacity: 0.6; margin-top: 4px; }
  .sr-note { padding: 20px 6px; font-size: 17px; opacity: 0.6; }

  /* ——— Turn-by-turn banner + ETA ——— */
  .navbar {
    position:absolute; top: 26px; left: 36px; right: 176px;
    display:flex; align-items:center; gap: 18px;
    padding: 16px 22px;
    background: rgba(0,0,0,0.45);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 18px; z-index: 20;
  }
  .nav-arrow { font-size: 46px; line-height: 1; font-weight: 300; flex:0 0 auto; width:48px; text-align:center; }
  .nav-stack { display:flex; flex-direction:column; gap: 4px; min-width:0; }
  .nav-dist { font-size: 34px; font-weight: 300; line-height: 1; font-variant-numeric: tabular-nums; }
  .nav-instr {
    font-size: 20px; font-weight: 300; opacity: 0.85; line-height: 1.15;
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .eta {
    position:absolute; left:50%; bottom: 34px; transform: translateX(-50%);
    padding: 12px 26px;
    border: 1.5px solid rgba(255,255,255,0.4); border-radius: 100px;
    font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums;
    background: rgba(0,0,0,0.4); z-index: 20; white-space:nowrap;
  }

  /* Navigation-mode rearrangement: clear the top for the banner,
     swap the next-feature pill for the ETA, keep speed + limit. */
  .hud.navigating .top { justify-content: flex-end; }
  .hud.navigating .gmeter { display:none; }
  .hud.navigating .compass { display:none; }
  .hud.navigating .next { display:none; }

  /* ——— Toast ——— */
  .toast {
    position:absolute; left:50%; bottom: 100px; transform: translateX(-50%);
    padding: 12px 22px; border-radius: 100px;
    background: rgba(0,0,0,0.82); border:1px solid rgba(255,255,255,0.25);
    font-size: 18px; font-weight: 300; z-index: 45; white-space:nowrap;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="stage">

  <!-- Permission gate -->
  <div class="gate" id="gate">
    <h1>Drive HUD</h1>
    <p>Live speed, posted limit, heading, and the next signal or stop ahead. Needs location and motion access.</p>
    <button id="startBtn">Start</button>
  </div>

  <!-- Main HUD -->
  <div class="hud hidden" id="hud">
    <div class="top">
      <div class="compass">
        <div class="rose" id="rose"><div class="needle"></div></div>
        <div class="heading-txt" id="headingTxt">—</div>
      </div>
      <div class="limit dim" id="limit">
        <div class="limit-label">SPEED<br>LIMIT</div>
        <div class="limit-val" id="limitVal">—</div>
      </div>
    </div>

    <div class="gmeter" id="gmeter">
      <div class="gdial"><div class="gdot" id="gdot"></div></div>
      <div class="g-txt"><span id="gVal">0.0</span><span class="g-unit">g</span></div>
    </div>

    <div class="speed-wrap">
      <div class="speed" id="speed">0</div>
      <div class="speed-unit">MPH</div>
    </div>

    <div class="next dim" id="next">
      <div class="next-icon" id="nextIcon">◇</div>
      <div class="next-stack">
        <div class="next-distance" id="nextDist">—</div>
        <div class="next-label" id="nextLabel">scanning</div>
      </div>
    </div>

    <!-- Turn-by-turn banner (navigation mode) -->
    <div class="navbar hidden" id="navbar">
      <div class="nav-arrow" id="navArrow">↑</div>
      <div class="nav-stack">
        <div class="nav-dist" id="navDist">—</div>
        <div class="nav-instr" id="navInstr">—</div>
      </div>
    </div>

    <!-- ETA strip (navigation mode) -->
    <div class="eta hidden" id="eta"><span id="etaText">—</span></div>

    <!-- Low-key menu button -->
    <button class="menu-btn" id="menuBtn" aria-label="Search and menu">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>
    </button>

    <!-- Menu panel -->
    <div class="menu hidden" id="menu">
      <button class="menu-item" id="miSearch">Search destination</button>
      <button class="menu-item hidden" id="miStop">End navigation</button>
      <button class="menu-item" id="miRestart">Restart GPS</button>
      <button class="menu-item" id="miPerms">Location permission</button>
    </div>

    <!-- Search overlay -->
    <div class="search hidden" id="search">
      <div class="search-bar">
        <input id="searchInput" type="text" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Search address or place">
        <button id="searchClose" aria-label="Close">✕</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Transient toast -->
    <div class="toast hidden" id="toast"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ——— State ———
  const state = {
    lat: null, lon: null,
    speed: 0,            // m/s, smoothed
    rawSpeed: 0,         // m/s, latest
    gpsHeading: null,    // degrees from true north, GPS-derived
    devHeading: null,    // degrees from true north, device-orientation-derived
    speedLimit: null,    // mph
    nextFeature: null,   // {distance(m), label, icon}
    lastOSMt: 0,
    lastOSMLat: null, lastOSMLon: null,
    lastFixT: 0,
    aLong: 0,            // m/s², smoothed longitudinal accel (+ = speeding up)
    aLat: 0,             // m/s², smoothed lateral accel (+ = turning right)
    nav: null,           // active navigation session (see startRoute)
  };
  let lastPos = null;
  let accPrev = null;    // { t, speed, heading } for the g-force estimate
  let searchTimer = null;
  let toastTimer = null;

  // ——— DOM ———
  const $ = id => document.getElementById(id);
  const els = {
    gate: $('gate'), hud: $('hud'), startBtn: $('startBtn'),
    speed: $('speed'),
    limit: $('limit'), limitVal: $('limitVal'),
    rose: $('rose'), headingTxt: $('headingTxt'),
    next: $('next'), nextIcon: $('nextIcon'),
    nextDist: $('nextDist'), nextLabel: $('nextLabel'),
    gmeter: $('gmeter'), gdot: $('gdot'), gVal: $('gVal'),
    menuBtn: $('menuBtn'), menu: $('menu'),
    miSearch: $('miSearch'), miStop: $('miStop'), miRestart: $('miRestart'), miPerms: $('miPerms'),
    search: $('search'), searchInput: $('searchInput'), searchClose: $('searchClose'), searchResults: $('searchResults'),
    navbar: $('navbar'), navArrow: $('navArrow'), navDist: $('navDist'), navInstr: $('navInstr'),
    eta: $('eta'), etaText: $('etaText'), toast: $('toast'),
  };

  // ——— Math helpers ———
  const MS_TO_MPH = 2.2369362921;
  const M_TO_FT = 3.2808399;
  const FT_PER_MI = 5280;

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
    const dφ = (lat2 - lat1) * Math.PI/180;
    const dλ = (lon2 - lon1) * Math.PI/180;
    const a = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function bearing(lat1, lon1, lat2, lon2) {
    const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
    const dλ = (lon2 - lon1) * Math.PI/180;
    const y = Math.sin(dλ) * Math.cos(φ2);
    const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(dλ);
    return ((Math.atan2(y, x) * 180/Math.PI) + 360) % 360;
  }
  function cardinal(deg) {
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
  }
  function effectiveHeading() {
    // Prefer GPS heading when moving fast enough to be reliable.
    if (state.gpsHeading != null && state.speed > 1.5) return state.gpsHeading;
    if (state.devHeading != null) return state.devHeading;
    return state.gpsHeading; // null when truly nothing
  }

  // ——— Render (rAF batched, value-gated) ———
  let pending = false;
  const last = {
    speedInt: -1, limit: '_', headingTxt: '_', headingDeg: NaN,
    distTxt: '_', labelTxt: '_', iconTxt: '_',
    nextDim: null, limitState: '_', speedOver: null,
    gTxt: '_', gx: NaN, gy: NaN, gHigh: null,
    navOn: false, navInstr: '_', navDist: '_', navArrow: '_', etaText: '_',
  };
  function scheduleRender() {
    if (pending) return;
    pending = true;
    requestAnimationFrame(render);
  }
  function render() {
    pending = false;

    // Speed (integer mph)
    const mph = Math.max(0, Math.round(state.speed * MS_TO_MPH));
    if (mph !== last.speedInt) {
      els.speed.textContent = mph;
      last.speedInt = mph;
    }
    // Speed over limit highlight
    const over = state.speedLimit != null && mph > state.speedLimit + 4;
    if (over !== last.speedOver) {
      els.speed.classList.toggle('over', over);
      last.speedOver = over;
    }

    // Limit
    let limitState;
    if (state.speedLimit == null) limitState = 'dim';
    else if (over) limitState = 'over';
    else limitState = 'on';
    if (limitState !== last.limitState) {
      els.limit.classList.toggle('dim', limitState === 'dim');
      els.limit.classList.toggle('over', limitState === 'over');
      last.limitState = limitState;
    }
    const limitTxt = state.speedLimit == null ? '—' : String(state.speedLimit);
    if (limitTxt !== last.limit) {
      els.limitVal.textContent = limitTxt;
      last.limit = limitTxt;
    }

    // Heading
    const h = effectiveHeading();
    if (h != null) {
      const txt = `${cardinal(h)} ${Math.round(h)}°`;
      if (txt !== last.headingTxt) {
        els.headingTxt.textContent = txt;
        last.headingTxt = txt;
      }
      // Rotate the rose so N always points to true north in the world.
      // The rose is fixed in the user's view; N on the dial moves to the
      // user's left as they turn right (clockwise heading increases).
      const rounded = Math.round(h);
      if (rounded !== last.headingDeg) {
        els.rose.style.transform = `rotate(${-rounded}deg)`;
        last.headingDeg = rounded;
      }
    }

    // Estimated g-force: magnitude in g + a direction dot (up = forward).
    const G = 9.80665;
    const gx = state.aLat / G;    // + = right
    const gy = state.aLong / G;   // + = forward
    const gMag = Math.hypot(gx, gy);
    const gTxt = gMag.toFixed(1);
    if (gTxt !== last.gTxt) {
      els.gVal.textContent = gTxt;
      last.gTxt = gTxt;
    }
    // Clamp the vector to the 1g circle; forward maps to "up" on the dial.
    let vx = gx, vy = -gy;
    const vmag = Math.hypot(vx, vy);
    if (vmag > 1) { vx /= vmag; vy /= vmag; }
    const dotX = Math.round(vx * 26), dotY = Math.round(vy * 26);
    if (dotX !== last.gx || dotY !== last.gy) {
      els.gdot.style.transform = `translate(calc(-50% + ${dotX}px), calc(-50% + ${dotY}px))`;
      last.gx = dotX; last.gy = dotY;
    }
    const gHigh = gMag > 0.6;
    if (gHigh !== last.gHigh) {
      els.gmeter.classList.toggle('high', gHigh);
      last.gHigh = gHigh;
    }

    // Next feature
    const nf = state.nextFeature;
    if (nf) {
      const ft = nf.distance * M_TO_FT;
      const distTxt = ft >= 1000
        ? (ft / FT_PER_MI).toFixed(1) + ' mi'
        : Math.round(ft / 10) * 10 + ' ft';
      if (distTxt !== last.distTxt) {
        els.nextDist.textContent = distTxt;
        last.distTxt = distTxt;
      }
      if (nf.label !== last.labelTxt) {
        els.nextLabel.textContent = nf.label;
        last.labelTxt = nf.label;
      }
      if (nf.icon !== last.iconTxt) {
        els.nextIcon.textContent = nf.icon;
        last.iconTxt = nf.icon;
      }
      if (last.nextDim !== false) {
        els.next.classList.remove('dim');
        last.nextDim = false;
      }
    } else {
      if (last.distTxt !== '—') { els.nextDist.textContent = '—'; last.distTxt = '—'; }
      if (last.labelTxt !== 'scanning') { els.nextLabel.textContent = 'scanning'; last.labelTxt = 'scanning'; }
      if (last.iconTxt !== '◇') { els.nextIcon.textContent = '◇'; last.iconTxt = '◇'; }
      if (last.nextDim !== true) {
        els.next.classList.add('dim');
        last.nextDim = true;
      }
    }

    // Navigation: turn banner, ETA, and the layout swap
    const nav = state.nav;
    if (nav) {
      if (last.navOn !== true) {
        els.hud.classList.add('navigating');
        els.navbar.classList.remove('hidden');
        els.eta.classList.remove('hidden');
        last.navOn = true;
      }
      if (nav.arrived) {
        if (last.navInstr !== '__arrived__') {
          els.navArrow.textContent = '◉';
          els.navDist.textContent = 'Arrived';
          els.navInstr.textContent = nav.dest.label || '';
          els.etaText.textContent = 'You have arrived';
          last.navInstr = '__arrived__';
        }
        if (!nav.exitTimer) nav.exitTimer = setTimeout(stopNav, 6000);
      } else {
        const stp = nav.steps[nav.idx] || {};
        const distTxt = fmtDist(nav.distToTurn || 0);
        if (distTxt !== last.navDist) { els.navDist.textContent = distTxt; last.navDist = distTxt; }
        const instr = stp.instr || '—';
        if (instr !== last.navInstr) { els.navInstr.textContent = instr; last.navInstr = instr; }
        const arrow = stp.arrow || '↑';
        if (arrow !== last.navArrow) { els.navArrow.textContent = arrow; last.navArrow = arrow; }
        const mins = Math.max(1, Math.round((nav.remDur || 0) / 60));
        const etaTxt = mins + ' min · ' + fmtDist(nav.remDist || 0);
        if (etaTxt !== last.etaText) { els.etaText.textContent = etaTxt; last.etaText = etaTxt; }
      }
    } else if (last.navOn !== false) {
      els.hud.classList.remove('navigating');
      els.navbar.classList.add('hidden');
      els.eta.classList.add('hidden');
      last.navOn = false;
      last.navInstr = '_'; last.navDist = '_'; last.navArrow = '_'; last.etaText = '_';
    }
  }

  // ——— Geolocation ———
  function onPosition(pos) {
    const t = pos.timestamp || Date.now();
    const { latitude, longitude, speed, heading } = pos.coords;

    state.lat = latitude;
    state.lon = longitude;
    state.lastFixT = t;

    // Speed: prefer GPS-reported, else compute from last position
    let newSpeed;
    if (speed != null && !isNaN(speed) && speed >= 0) {
      newSpeed = speed;
    } else if (lastPos) {
      const dt = (t - lastPos.t) / 1000;
      const d = haversine(lastPos.lat, lastPos.lon, latitude, longitude);
      newSpeed = dt > 0 ? d / dt : state.speed;
    } else {
      newSpeed = 0;
    }
    state.rawSpeed = newSpeed;
    // Light EMA smoothing so the big number doesn't jitter
    state.speed = state.speed * 0.55 + newSpeed * 0.45;

    if (heading != null && !isNaN(heading) && state.speed > 1.5) {
      state.gpsHeading = heading;
    }

    // Estimate g-forces (no real IMU): longitudinal from how fast speed
    // changes; lateral from turn rate × speed (a_lat = v·dθ/dt).
    const hNow = effectiveHeading();
    if (accPrev && t > accPrev.t) {
      const dt = (t - accPrev.t) / 1000;
      if (dt > 0.05 && dt < 3) {
        const aL = (state.speed - accPrev.speed) / dt;
        let aLat = 0;
        if (hNow != null && accPrev.heading != null) {
          let dH = hNow - accPrev.heading;
          while (dH > 180) dH -= 360;
          while (dH < -180) dH += 360;
          aLat = state.speed * (dH * Math.PI / 180) / dt;
        }
        state.aLong = state.aLong * 0.6 + aL * 0.4;
        state.aLat = state.aLat * 0.6 + aLat * 0.4;
      }
    }
    accPrev = { t, speed: state.speed, heading: hNow };

    lastPos = { lat: latitude, lon: longitude, t };

    if (state.nav) updateNavigation();

    scheduleRender();
    maybeQueryOSM();
  }
  function onPositionError(err) {
    console.warn('Geolocation error:', err.code, err.message);
    if (err.code === 1) {
      showError('Location permission denied. Enable it in glasses settings, then restart.');
    } else if (err.code === 2) {
      showError('Location unavailable. Check that your phone has GPS signal.');
    }
  }

  // ——— Device orientation (compass when stationary) ———
  function onOrientation(e) {
    // iOS Safari provides webkitCompassHeading (0 = north, clockwise).
    // On other runtimes (likely MRBD), use alpha. Note alpha is counter-
    // clockwise from north, so we convert: compass = 360 - alpha.
    let h = null;
    if (typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading)) {
      h = e.webkitCompassHeading;
    } else if (typeof e.alpha === 'number' && !isNaN(e.alpha)) {
      h = (360 - e.alpha) % 360;
    }
    if (h == null) return;
    state.devHeading = h;
    // Only push to render if we're using device heading (i.e., stationary)
    if (!(state.gpsHeading != null && state.speed > 1.5)) {
      scheduleRender();
    }
  }

  // ——— OSM Overpass: speed limit + nearest signal/stop ahead ———
  const OVERPASS = 'https://overpass-api.de/api/interpreter';

  async function maybeQueryOSM() {
    if (state.lat == null) return;
    const now = Date.now();
    const moved = state.lastOSMLat == null ? Infinity
      : haversine(state.lat, state.lon, state.lastOSMLat, state.lastOSMLon);
    // Throttle: refresh every 8s or after 25m of movement
    if (now - state.lastOSMt < 8000 && moved < 25) return;

    state.lastOSMt = now;
    state.lastOSMLat = state.lat;
    state.lastOSMLon = state.lon;

    const radius = 600;
    // Two-part query: nearest road segment with maxspeed; signals/stops nearby
    const q =
      `[out:json][timeout:6];
       (
         way(around:25,${state.lat},${state.lon})["highway"]["maxspeed"];
         node(around:${radius},${state.lat},${state.lon})["highway"~"^(traffic_signals|stop)$"];
       );
       out tags center;`;

    try {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 7000);
      const r = await fetch(OVERPASS, {
        method: 'POST',
        body: 'data=' + encodeURIComponent(q),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!r.ok) return;
      const data = await r.json();
      processOSM(data);
    } catch (e) {
      // Network blip or rate-limit; silently keep going
      console.warn('Overpass failed:', e.message || e);
    }
  }

  function parseMaxspeed(raw) {
    if (!raw) return null;
    // Handles: "35", "35 mph", "50 km/h", "signals", "none"
    const m = String(raw).match(/(\d+)\s*(mph|km\/h)?/i);
    if (!m) return null;
    const v = parseInt(m[1], 10);
    const unit = (m[2] || '').toLowerCase();
    if (unit === 'km/h') return Math.round(v * 0.621371);
    // Default assumption in US OSM data is mph if unitless on a US road,
    // but globally OSM defaults to km/h. We assume mph (US driving HUD).
    return v;
  }

  function processOSM(data) {
    // Speed limit: any way with maxspeed within snap radius
    let limit = null;
    for (const el of data.elements) {
      if (el.type === 'way' && el.tags && el.tags.maxspeed) {
        const v = parseMaxspeed(el.tags.maxspeed);
        if (v != null) { limit = v; break; }
      }
    }
    state.speedLimit = limit;

    // Next signal/stop ahead
    const heading = effectiveHeading();
    let best = null;
    for (const el of data.elements) {
      if (el.type !== 'node' || !el.tags || !el.tags.highway) continue;
      const type = el.tags.highway;
      if (type !== 'traffic_signals' && type !== 'stop') continue;
      const d = haversine(state.lat, state.lon, el.lat, el.lon);

      // Filter: ahead of user (within ±70° of heading) when we have one
      if (heading != null) {
        const b = bearing(state.lat, state.lon, el.lat, el.lon);
        let diff = Math.abs(((b - heading + 540) % 360) - 180);
        if (diff > 70) continue;
      }
      if (d < (best?.distance ?? Infinity)) {
        best = {
          distance: d,
          label: type === 'traffic_signals' ? 'signal' : 'stop',
          icon: type === 'traffic_signals' ? '●' : '◆',
        };
      }
    }
    state.nextFeature = best;

    scheduleRender();
  }

  // ——— Search (Nominatim) + routing (OSRM), both keyless ———
  const NOMINATIM = 'https://nominatim.openstreetmap.org/search';
  const OSRM = 'https://router.project-osrm.org/route/v1/driving/';

  const escapeHtml = s => String(s).replace(/[&<>"]/g,
    c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));

  function toast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.add('hidden'), 2500);
  }

  function openMenu(show) {
    const open = show == null ? els.menu.classList.contains('hidden') : show;
    els.menu.classList.toggle('hidden', !open);
    els.miStop.classList.toggle('hidden', !state.nav);
  }
  function openSearch() {
    openMenu(false);
    els.search.classList.remove('hidden');
    els.searchInput.value = '';
    els.searchResults.innerHTML = '';
    setTimeout(() => els.searchInput.focus(), 60);
  }
  function closeSearch() {
    els.search.classList.add('hidden');
    els.searchInput.blur();
  }

  async function runSearch(q) {
    if (!q || q.trim().length < 3) { els.searchResults.innerHTML = ''; return; }
    els.searchResults.innerHTML = '<div class="sr-note">Searching...</div>';
    try {
      const url = new URL(NOMINATIM);
      url.searchParams.set('q', q);
      url.searchParams.set('format', 'json');
      url.searchParams.set('limit', '6');
      url.searchParams.set('addressdetails', '1');
      if (state.lat != null) {
        const d = 0.6; // bias toward, but don't restrict to, the area around us
        url.searchParams.set('viewbox', `${state.lon - d},${state.lat + d},${state.lon + d},${state.lat - d}`);
        url.searchParams.set('bounded', '0');
      }
      const r = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!r.ok) throw new Error('search ' + r.status);
      renderResults(await r.json());
    } catch (e) {
      els.searchResults.innerHTML = '<div class="sr-note">Search failed. Try again.</div>';
    }
  }

  function renderResults(data) {
    if (!data || !data.length) { els.searchResults.innerHTML = '<div class="sr-note">No matches.</div>'; return; }
    els.searchResults.innerHTML = '';
    data.forEach(item => {
      const parts = (item.display_name || 'Unknown').split(', ');
      const div = document.createElement('div');
      div.className = 'sr-item';
      div.innerHTML = `<div class="sr-title">${escapeHtml(parts[0])}</div>` +
        `<div class="sr-sub">${escapeHtml(parts.slice(1, 4).join(', '))}</div>`;
      div.addEventListener('click', () => {
        closeSearch();
        startRoute(parseFloat(item.lat), parseFloat(item.lon), parts[0]);
      });
      els.searchResults.appendChild(div);
    });
  }

  async function startRoute(dlat, dlon, label) {
    if (state.lat == null) { toast('Waiting for GPS...'); return; }
    toast('Finding route...');
    const route = await fetchRoute(state.lat, state.lon, dlat, dlon);
    if (!route) { toast('No route found'); return; }
    state.nav = {
      dest: { lat: dlat, lon: dlon, label: label || 'Destination' },
      steps: route.steps, geometry: route.geometry,
      idx: 0, totalDist: route.distance, totalDur: route.duration,
      distToTurn: 0, remDist: route.distance, remDur: route.duration,
      arrived: false, offCount: 0, rerouting: false, exitTimer: null,
    };
    updateNavigation();
    scheduleRender();
  }

  async function fetchRoute(slat, slon, dlat, dlon) {
    try {
      const url = OSRM + `${slon},${slat};${dlon},${dlat}` +
        '?overview=full&geometries=geojson&steps=true&annotations=false';
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 12000);
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(to);
      if (!r.ok) return null;
      const data = await r.json();
      if (data.code !== 'Ok' || !data.routes || !data.routes.length) return null;
      const rt = data.routes[0];
      const geometry = (rt.geometry.coordinates || []).map(c => ({ lat: c[1], lon: c[0] }));
      const steps = (rt.legs[0].steps || []).map(s => {
        const m = s.maneuver;
        return {
          lat: m.location[1], lon: m.location[0],
          dist: s.distance || 0,
          instr: maneuverText(m, s.name || ''),
          arrow: maneuverArrow(m),
        };
      });
      return { steps, geometry, distance: rt.distance, duration: rt.duration };
    } catch (e) { return null; }
  }

  function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }
  function maneuverText(m, road) {
    const mod = m.modifier || '';
    const onto = road ? ' onto ' + road : '';
    switch (m.type) {
      case 'depart': return road ? 'Head out on ' + road : 'Start driving';
      case 'turn':
      case 'end of road': return 'Turn ' + (mod || 'ahead') + onto;
      case 'merge': return 'Merge' + (mod ? ' ' + mod : '') + onto;
      case 'on ramp': return 'Take the ramp' + onto;
      case 'off ramp': return 'Take the exit' + onto;
      case 'fork': return 'Keep ' + (mod || 'straight') + onto;
      case 'continue': return 'Continue' + (mod && mod !== 'straight' ? ' ' + mod : '') + onto;
      case 'roundabout':
      case 'rotary': return 'Enter the roundabout' + (m.exit ? ', exit ' + m.exit : '');
      case 'new name': return 'Continue' + onto;
      case 'arrive': return road ? 'Arrive at ' + road : 'Arrive at destination';
      default: return mod ? cap(mod) + onto : 'Continue' + onto;
    }
  }
  function maneuverArrow(m) {
    if (m.type === 'arrive') return '◉';
    if (m.type === 'roundabout' || m.type === 'rotary') return '↻';
    switch (m.modifier) {
      case 'left': case 'sharp left': return '←';
      case 'slight left': return '↖';
      case 'right': case 'sharp right': return '→';
      case 'slight right': return '↗';
      case 'uturn': return '↩';
      default: return '↑';
    }
  }

  function fmtDist(m) {
    const ft = m * M_TO_FT;
    if (ft >= 1000) return (ft / FT_PER_MI).toFixed(1) + ' mi';
    return Math.max(0, Math.round(ft / 10) * 10) + ' ft';
  }

  function stopNav() {
    if (state.nav && state.nav.exitTimer) clearTimeout(state.nav.exitTimer);
    state.nav = null;
    scheduleRender();
  }

  function reroute() {
    const nav = state.nav;
    if (!nav) return;
    nav.rerouting = true;
    toast('Rerouting...');
    fetchRoute(state.lat, state.lon, nav.dest.lat, nav.dest.lon).then(route => {
      if (!state.nav) return;
      state.nav.rerouting = false;
      if (route) {
        Object.assign(state.nav, {
          steps: route.steps, geometry: route.geometry, idx: 0,
          totalDist: route.distance, totalDur: route.duration, offCount: 0,
        });
        updateNavigation();
        scheduleRender();
      }
    });
  }

  function nearestRouteDist(lat, lon, geom) {
    let min = Infinity;
    for (let i = 0; i < geom.length; i++) {
      const d = haversine(lat, lon, geom[i].lat, geom[i].lon);
      if (d < min) min = d;
    }
    return min;
  }

  function updateNavigation() {
    const nav = state.nav;
    if (!nav || state.lat == null) return;
    const steps = nav.steps;
    let stp = steps[nav.idx];
    if (!stp) return;
    let dMan = haversine(state.lat, state.lon, stp.lat, stp.lon);
    while (nav.idx < steps.length - 1 && dMan < 25) {
      nav.idx++; stp = steps[nav.idx];
      dMan = haversine(state.lat, state.lon, stp.lat, stp.lon);
    }
    nav.distToTurn = dMan;
    let rem = dMan;
    for (let i = nav.idx + 1; i < steps.length; i++) rem += steps[i].dist;
    nav.remDist = rem;
    nav.remDur = nav.totalDist > 0 ? nav.totalDur * (rem / nav.totalDist) : 0;
    const dDest = haversine(state.lat, state.lon, nav.dest.lat, nav.dest.lon);
    if (nav.idx >= steps.length - 1 && dDest < 30) nav.arrived = true;
    const off = nearestRouteDist(state.lat, state.lon, nav.geometry);
    nav.offCount = off > 60 ? (nav.offCount || 0) + 1 : 0;
    if (nav.offCount >= 2 && !nav.rerouting && !nav.arrived) reroute();
  }

  // ——— Error display ———
  function showError(msg) {
    els.hud.classList.add('hidden');
    els.gate.classList.remove('hidden');
    els.gate.classList.add('error');
    els.gate.querySelector('h1').textContent = 'Can’t start';
    els.gate.querySelector('p').textContent = msg;
    els.startBtn.textContent = 'Retry';
    els.startBtn.focus();
  }

  // ——— Start ———
  let watchId = null;
  async function start() {
    els.gate.classList.add('hidden');
    els.gate.classList.remove('error');
    els.hud.classList.remove('hidden');

    // Orientation permission (iOS Safari path; MRBD typically auto-grants)
    try {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res === 'granted') {
          window.addEventListener('deviceorientation', onOrientation);
        }
      } else if (typeof DeviceOrientationEvent !== 'undefined') {
        window.addEventListener('deviceorientation', onOrientation);
      }
    } catch (e) { /* keep going without compass */ }

    // Geolocation
    if (!('geolocation' in navigator)) {
      showError('This device does not expose geolocation to web apps.');
      return;
    }
    if (watchId != null) navigator.geolocation.clearWatch(watchId);
    watchId = navigator.geolocation.watchPosition(
      onPosition,
      onPositionError,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 1000 }
    );

    scheduleRender();
  }

  // ——— D-pad input (Start button is the only focusable target pre-start) ———
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (!els.gate.classList.contains('hidden')) {
        e.preventDefault();
        start();
      }
    } else if (e.key === 'Escape') {
      if (!els.search.classList.contains('hidden')) closeSearch();
      else if (!els.menu.classList.contains('hidden')) openMenu(false);
    }
  });

  els.startBtn.addEventListener('click', start);
  window.addEventListener('load', () => els.startBtn.focus());

  // ——— Menu + search wiring ———
  els.menuBtn.addEventListener('click', e => { e.stopPropagation(); openMenu(); });
  els.miSearch.addEventListener('click', e => { e.stopPropagation(); openSearch(); });
  els.miStop.addEventListener('click', e => { e.stopPropagation(); stopNav(); openMenu(false); });
  els.miRestart.addEventListener('click', e => { e.stopPropagation(); openMenu(false); start(); });
  els.miPerms.addEventListener('click', e => { e.stopPropagation(); openMenu(false); start(); });
  els.searchClose.addEventListener('click', e => { e.stopPropagation(); closeSearch(); });
  els.searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = els.searchInput.value;
    searchTimer = setTimeout(() => runSearch(q), 500);
  });
  els.searchInput.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') { e.preventDefault(); clearTimeout(searchTimer); runSearch(els.searchInput.value); }
  });
  // Tap outside the menu closes it.
  document.addEventListener('click', e => {
    if (!els.menu.classList.contains('hidden') &&
        !els.menu.contains(e.target) && !els.menuBtn.contains(e.target)) {
      openMenu(false);
    }
  });

  // Re-render every 500ms while running so distance counts down smoothly
  // even between GPS fixes. Cheap because render() short-circuits on
  // unchanged values.
  setInterval(() => {
    if (!els.hud.classList.contains('hidden') && state.nextFeature && state.lat != null) {
      // Reproject distance from current position; cheaper than re-querying OSM
      scheduleRender();
    }
  }, 500);
})();
</script>
</body>
</html>
