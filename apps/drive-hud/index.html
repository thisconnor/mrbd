<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<title>Drive HUD</title>
<link rel="icon" href="data:,">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:600px; height:600px; overflow:hidden;
    background:#000; color:#fff;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro", "Helvetica Neue", system-ui, sans-serif;
    font-weight: 200;
    letter-spacing: -0.01em;
    user-select: none;
    -webkit-user-select: none;
  }

  .stage { position:relative; width:600px; height:600px; }
  .hidden { display: none !important; }

  /* ——— Speed limit sign (centered in right area, beside speedometer) ——— */
  .limit {
    position: absolute;
    top: 36px;
    left: 414px;
    width: 132px; height: 168px;
    border: 2.5px solid #fff;
    border-radius: 18px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 12px 6px 10px;
    transition: border-color 200ms ease, box-shadow 200ms ease;
  }
  .limit-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    line-height: 1.15;
    text-align:center;
    opacity: 0.95;
  }
  .limit-val {
    font-size: 76px;
    font-weight: 300;
    line-height: 1;
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
    transition: color 200ms ease;
  }
  .limit.dim { border-color: rgba(255,255,255,0.25); }
  .limit.dim .limit-label,
  .limit.dim .limit-val { opacity: 0.35; }
  .limit.over {
    border-color: #ff4444;
    box-shadow: 0 0 32px rgba(255, 68, 68, 0.45);
  }
  .limit.over .limit-val { color: #ff4444; }

  /* ——— Speedometer column: fixed 340px width so triple-digit speeds never
         clip, and so MPH + search icon below center on the same vertical
         line regardless of how wide the speed digits are. ——— */
  .speed-wrap {
    position:absolute;
    top:50%; left:24px;
    width: 340px;
    transform: translateY(-50%);
    text-align:center;
    line-height: 1;
  }
  .speed {
    font-size: 280px;
    font-weight: 100;
    letter-spacing: -0.06em;
    line-height: 0.9;
    font-variant-numeric: tabular-nums;
  }
  .speed-unit {
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.35em;
    margin-top: 18px;
    opacity: 0.85;
    text-indent: 0.35em; /* optical centering: pulls track-spaced text back to center */
  }
  .speed.over { color: #ff4444; }

  /* ——— Bottom row: shares the same 340px column as the speedometer so the
         search icon (idle) and maneuver card (navigating) sit on the same
         vertical center line as the speed digits and MPH above. ——— */
  .bottom {
    position:absolute;
    bottom: 32px;
    left: 24px;
    width: 340px;
    display:flex; align-items:center; justify-content:center;
    gap: 18px;
  }

  /* Maneuver card (navigation mode) */
  .maneuver {
    flex: 1;
    display:flex; align-items:center; gap:22px;
    padding: 18px 26px;
    border: 1.5px solid rgba(255,255,255,0.65);
    border-radius: 22px;
    background: transparent;
    min-height: 96px;
    max-width: 340px;
    color: #fff;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
  }
  .maneuver:focus {
    outline: none;
    border-color: #fff;
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 22px rgba(255,255,255,0.18);
  }
  .maneuver.rerouting {
    border-color: rgba(255,200,80,0.7);
    box-shadow: 0 0 18px rgba(255,200,80,0.2);
  }
  .maneuver.rerouting .maneuver-icon {
    opacity: 0.6;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.25; } }

  /* Trip info overlay */
  .trip-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px 40px;
  }
  .trip-dist {
    font-size: 110px;
    font-weight: 100;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .trip-time {
    font-size: 24px;
    font-weight: 300;
    opacity: 0.7;
    letter-spacing: 0.04em;
    margin-top: 10px;
  }
  .trip-dest {
    font-size: 17px;
    opacity: 0.5;
    margin-top: 36px;
    max-width: 480px;
    line-height: 1.35;
    letter-spacing: 0.01em;
    font-weight: 400;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .trip-actions {
    display: flex;
    gap: 20px;
    justify-content: center;
    padding-bottom: 28px;
  }
  .pill-btn {
    min-height: 88px;
    min-width: 180px;
    padding: 18px 36px;
    font-size: 20px;
    font-weight: 300;
    font-family: inherit;
    color: #fff;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 120ms, border-color 120ms, box-shadow 120ms, color 120ms;
  }
  .pill-btn:focus {
    outline: none;
    background: rgba(255,255,255,0.1);
    border-color: #fff;
    box-shadow: 0 0 22px rgba(255,255,255,0.2);
  }
  .pill-btn.danger {
    color: rgba(255, 138, 138, 0.95);
    border-color: rgba(255, 100, 100, 0.45);
  }
  .pill-btn.danger:focus {
    background: rgba(255, 68, 68, 0.14);
    border-color: #ff4444;
    color: #ff4444;
    box-shadow: 0 0 22px rgba(255, 68, 68, 0.3);
  }
  .maneuver-icon {
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
    width: 60px;
    text-align: center;
    flex-shrink: 0;
  }
  .maneuver-stack {
    display:flex; flex-direction:column; gap: 4px;
    min-width: 0;
    flex: 1;
  }
  .maneuver-dist {
    font-size: 38px;
    font-weight: 300;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .maneuver-street {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.2;
    opacity: 0.75;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Search / End buttons (icon-only, low-key) */
  .icon-btn {
    width: 64px; height: 64px;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: transparent;
    color: #fff;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    flex-shrink: 0;
    padding: 0;
  }
  .icon-btn:focus, .icon-btn:hover {
    outline: none;
    opacity: 1;
    border-color: #fff;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 20px rgba(255,255,255,0.18);
  }
  .icon-btn svg {
    width: 26px; height: 26px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ——— Full-screen overlays (search / results) ——— */
  .overlay {
    position:absolute; inset:0;
    background:#000;
    padding: 30px 36px 28px;
    display:flex; flex-direction:column;
    z-index: 10;
  }

  /* Search input display */
  .search-header {
    display:flex; align-items:center; justify-content:space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .search-input {
    flex: 1;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.01em;
    padding: 10px 0;
    border-bottom: 1.5px solid rgba(255,255,255,0.35);
    min-height: 56px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: ltr;
    text-align: left;
    font-variant-numeric: tabular-nums;
  }
  .search-input.empty { opacity: 0.3; }
  .caret {
    display: inline-block;
    width: 2px;
    background: #fff;
    margin-left: 2px;
    vertical-align: text-bottom;
    height: 1em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .small-btn {
    width: 48px; height: 48px;
    border: 1.25px solid rgba(255,255,255,0.4);
    background: transparent;
    color: #fff;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: background 100ms, border-color 100ms;
    flex-shrink:0;
    padding:0;
  }
  .small-btn:focus {
    outline:none;
    background:#fff; color:#000;
    border-color:#fff;
  }
  .small-btn svg { width: 18px; height: 18px; stroke: currentColor; fill:none; stroke-width:2; stroke-linecap:round; }

  /* Keyboard */
  .keyboard {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-auto-rows: 1fr;
    gap: 5px;
    flex: 1;
    min-height: 0;
  }
  .key {
    border: 1.25px solid rgba(255,255,255,0.4);
    background: transparent;
    color: #fff;
    font-family: inherit;
    font-size: 24px;
    font-weight: 300;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 80ms, border-color 80ms, color 80ms;
    padding: 0;
  }
  .key:focus {
    outline: none;
    background: #fff;
    color: #000;
    border-color: #fff;
  }
  .key.span-4 { grid-column: span 4; }
  .key.span-2 { grid-column: span 2; }
  .key.action {
    font-size: 19px;
    letter-spacing: 0.06em;
    background: rgba(255,255,255,0.06);
  }
  .key.go { background: rgba(255,255,255,0.14); }
  .key.go:focus { background: #fff; color: #000; }

  /* Results */
  .results-header {
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; margin-bottom: 14px;
  }
  .results-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .results-list {
    flex: 1;
    display:flex; flex-direction:column;
    gap: 10px;
    overflow: hidden;
  }
  .result-item {
    min-height: 92px;
    border: 1.25px solid rgba(255,255,255,0.3);
    background: transparent;
    color: #fff;
    font-family: inherit;
    border-radius: 16px;
    padding: 14px 22px;
    text-align: left;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    transition: background 120ms, border-color 120ms;
  }
  .result-item:focus {
    outline: none;
    background: rgba(255,255,255,0.08);
    border-color: #fff;
    box-shadow: 0 0 18px rgba(255,255,255,0.12);
  }
  .result-name {
    font-size: 21px;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-addr {
    font-size: 14px;
    opacity: 0.6;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status {
    flex: 1;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding: 40px;
    gap: 16px;
  }
  .status-title { font-size: 28px; font-weight: 300; letter-spacing: -0.01em; }
  .status-sub { font-size: 15px; opacity: 0.6; line-height: 1.4; max-width: 420px; }

  /* ——— Permission gate ——— */
  .gate {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: 32px;
    padding: 60px;
    text-align:center;
    z-index: 20;
  }
  .gate h1 {
    font-size: 56px;
    font-weight: 100;
    letter-spacing: -0.03em;
  }
  .gate p {
    font-size: 17px;
    font-weight: 300;
    opacity: 0.7;
    line-height: 1.45;
    max-width: 460px;
  }
  .gate button {
    min-height: 88px;
    min-width: 220px;
    padding: 18px 44px;
    font-size: 22px;
    font-weight: 300;
    font-family: inherit;
    color: #fff;
    background: transparent;
    border: 1.5px solid #fff;
    border-radius: 100px;
    cursor: pointer;
    transition: background 150ms ease, box-shadow 150ms ease;
    letter-spacing: 0.02em;
  }
  .gate button:focus, .gate button:hover {
    outline: none;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 28px rgba(255,255,255,0.25);
  }
  .gate.error h1 { font-size: 36px; }
  .gate.error p { color: #ff8a8a; opacity: 1; }
</style>
</head>
<body>
<div class="stage">

  <!-- Permission gate -->
  <div class="gate" id="gate">
    <h1>Drive HUD</h1>
    <p>Live speed, posted limit, and on-demand turn-by-turn navigation. Needs location access.</p>
    <button id="startBtn">Start</button>
  </div>

  <!-- Main HUD -->
  <div class="hidden" id="hud">
    <div class="limit dim" id="limit">
      <div class="limit-label">SPEED<br>LIMIT</div>
      <div class="limit-val" id="limitVal">—</div>
    </div>

    <div class="speed-wrap">
      <div class="speed" id="speed">0</div>
      <div class="speed-unit">MPH</div>
    </div>

    <div class="bottom idle" id="bottom">
      <!-- Maneuver card: visible only when navigating. Clickable to open trip info. -->
      <button class="maneuver hidden" id="maneuver" aria-label="Trip info">
        <div class="maneuver-icon" id="maneuverIcon">↑</div>
        <div class="maneuver-stack">
          <div class="maneuver-dist" id="maneuverDist">—</div>
          <div class="maneuver-street" id="maneuverStreet">—</div>
        </div>
      </button>

      <!-- Search icon (idle + nav). Becomes "end" icon when navigating. -->
      <button class="icon-btn" id="searchBtn" aria-label="Search destination">
        <svg viewBox="0 0 24 24">
          <circle cx="10.5" cy="10.5" r="6.5"></circle>
          <line x1="15.2" y1="15.2" x2="20" y2="20"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- Search overlay -->
  <div class="overlay hidden" id="searchOverlay">
    <div class="search-header">
      <div class="search-input empty" id="searchInput">
        <span id="searchText">Enter address</span><span class="caret hidden" id="caret"></span>
      </div>
      <button class="small-btn" id="cancelBtn" aria-label="Cancel">
        <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
      </button>
    </div>
    <div class="keyboard" id="keyboard"></div>
  </div>

  <!-- Results overlay -->
  <div class="overlay hidden" id="resultsOverlay">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">Results</div>
      <button class="small-btn" id="resultsBackBtn" aria-label="Back">
        <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"></polyline></svg>
      </button>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

  <!-- Trip info overlay -->
  <div class="overlay hidden" id="tripOverlay">
    <div class="trip-content">
      <div class="trip-dist" id="tripDist">— mi</div>
      <div class="trip-time" id="tripTime">— min</div>
      <div class="trip-dest" id="tripDest">Destination</div>
    </div>
    <div class="trip-actions">
      <button class="pill-btn danger" id="endRouteBtn">End route</button>
      <button class="pill-btn" id="resumeBtn">Resume</button>
    </div>
  </div>

</div>

<script>
(() => {
  'use strict';

  // ===== Constants =====
  const MS_TO_MPH = 2.2369362921;
  const M_TO_FT = 3.2808399;
  const FT_PER_MI = 5280;
  const OVERPASS = 'https://overpass-api.de/api/interpreter';
  const NOMINATIM = 'https://nominatim.openstreetmap.org/search';
  const OSRM = 'https://router.project-osrm.org/route/v1/driving';

  // ===== State =====
  const state = {
    mode: 'idle',          // 'idle' | 'searching' | 'picking' | 'navigating' | 'trip-info'
    lat: null, lon: null,
    speed: 0, rawSpeed: 0,
    speedLimit: null,
    lastOSMt: 0, lastOSMLat: null, lastOSMLon: null,
    // Search
    query: '',
    results: [],
    // Routing
    route: null,           // { steps, coordinates, destination, totalMeters, totalSeconds }
    stepIdx: 0,
    rerouting: false,
    offRouteCount: 0,
  };
  let lastPos = null;

  // ===== DOM =====
  const $ = id => document.getElementById(id);
  const els = {
    gate: $('gate'), startBtn: $('startBtn'),
    hud: $('hud'), bottom: $('bottom'),
    speed: $('speed'),
    limit: $('limit'), limitVal: $('limitVal'),
    searchBtn: $('searchBtn'),
    maneuver: $('maneuver'), maneuverIcon: $('maneuverIcon'),
    maneuverDist: $('maneuverDist'), maneuverStreet: $('maneuverStreet'),
    searchOverlay: $('searchOverlay'),
    searchInput: $('searchInput'),
    searchText: $('searchText'),
    caret: $('caret'),
    cancelBtn: $('cancelBtn'),
    keyboard: $('keyboard'),
    resultsOverlay: $('resultsOverlay'),
    resultsTitle: $('resultsTitle'),
    resultsBackBtn: $('resultsBackBtn'),
    resultsList: $('resultsList'),
    tripOverlay: $('tripOverlay'),
    tripDist: $('tripDist'),
    tripTime: $('tripTime'),
    tripDest: $('tripDest'),
    endRouteBtn: $('endRouteBtn'),
    resumeBtn: $('resumeBtn'),
  };

  // ===== Math helpers =====
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
    const dφ = (lat2 - lat1) * Math.PI/180;
    const dλ = (lon2 - lon1) * Math.PI/180;
    const a = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function formatDistance(meters) {
    const ft = meters * M_TO_FT;
    if (ft >= 1000) return (ft / FT_PER_MI).toFixed(ft >= FT_PER_MI * 10 ? 0 : 1) + ' mi';
    return Math.round(ft / 10) * 10 + ' ft';
  }
  function formatTime(seconds) {
    if (seconds < 60) return Math.max(0, Math.round(seconds)) + ' sec';
    const totalMin = Math.round(seconds / 60);
    if (totalMin < 60) return totalMin + ' min';
    const hrs = Math.floor(totalMin / 60);
    const mins = totalMin % 60;
    return hrs + ' hr' + (mins > 0 ? ' ' + mins + ' min' : '');
  }
  // Point-to-segment distance with equirectangular approximation (fast & fine
  // at small scales). Coords are [lon, lat]. Returns meters.
  function pointToRouteDist(lat, lon, coords) {
    if (!coords || coords.length < 2) return Infinity;
    const cosLat = Math.cos(lat * Math.PI / 180);
    const px = lon * cosLat, py = lat;
    let minD2 = Infinity;
    for (let i = 0; i < coords.length - 1; i++) {
      const ax = coords[i][0] * cosLat, ay = coords[i][1];
      const bx = coords[i+1][0] * cosLat, by = coords[i+1][1];
      const dx = bx - ax, dy = by - ay;
      const len2 = dx*dx + dy*dy;
      let t = len2 > 0 ? ((px-ax)*dx + (py-ay)*dy) / len2 : 0;
      if (t < 0) t = 0; else if (t > 1) t = 1;
      const ex = ax + t*dx, ey = ay + t*dy;
      const ddx = px - ex, ddy = py - ey;
      const d2 = ddx*ddx + ddy*ddy;
      if (d2 < minD2) minD2 = d2;
    }
    return Math.sqrt(minD2) * 111320; // degrees → meters
  }
  function computeRemaining() {
    if (!state.route) return { meters: 0, seconds: 0 };
    const steps = state.route.steps;
    let m = 0, s = 0;
    for (let i = state.stepIdx; i < steps.length; i++) {
      if (i === state.stepIdx) {
        m += steps[i].remainingMeters || 0;
        const frac = steps[i].distanceM > 0
          ? (steps[i].remainingMeters || 0) / steps[i].distanceM : 0;
        s += (steps[i].durationS || 0) * frac;
      } else {
        m += steps[i].distanceM || 0;
        s += steps[i].durationS || 0;
      }
    }
    return { meters: m, seconds: s };
  }

  // ===== Render (rAF batched, value-gated) =====
  let pending = false;
  const last = {
    speedInt:-1, limit:'_',
    over:null, limitState:'_',
    manDist:'_', manStreet:'_', manIcon:'_',
    rerouting: null,
    tripDist:'_', tripTime:'_', tripDest:'_',
  };
  function scheduleRender() {
    if (pending) return;
    pending = true;
    requestAnimationFrame(render);
  }
  function render() {
    pending = false;

    // Speed
    const mph = Math.max(0, Math.round(state.speed * MS_TO_MPH));
    if (mph !== last.speedInt) { els.speed.textContent = mph; last.speedInt = mph; }
    const over = state.speedLimit != null && mph > state.speedLimit + 4;
    if (over !== last.over) { els.speed.classList.toggle('over', over); last.over = over; }

    // Limit
    let limitState;
    if (state.speedLimit == null) limitState = 'dim';
    else if (over) limitState = 'over';
    else limitState = 'on';
    if (limitState !== last.limitState) {
      els.limit.classList.toggle('dim', limitState === 'dim');
      els.limit.classList.toggle('over', limitState === 'over');
      last.limitState = limitState;
    }
    const limitTxt = state.speedLimit == null ? '—' : String(state.speedLimit);
    if (limitTxt !== last.limit) { els.limitVal.textContent = limitTxt; last.limit = limitTxt; }

    // Maneuver (only when navigating)
    if ((state.mode === 'navigating' || state.mode === 'trip-info') && state.route) {
      if (state.rerouting !== last.rerouting) {
        els.maneuver.classList.toggle('rerouting', state.rerouting);
        last.rerouting = state.rerouting;
      }
      if (state.rerouting) {
        if (last.manDist !== '...') { els.maneuverDist.textContent = '...'; last.manDist = '...'; }
        if (last.manStreet !== 'recalculating') { els.maneuverStreet.textContent = 'recalculating'; last.manStreet = 'recalculating'; }
        if (last.manIcon !== '↻') { els.maneuverIcon.textContent = '↻'; last.manIcon = '↻'; }
      } else {
        const step = state.route.steps[state.stepIdx];
        if (step) {
          const dist = formatDistance(step.remainingMeters);
          if (dist !== last.manDist) { els.maneuverDist.textContent = dist; last.manDist = dist; }
          const street = step.streetName || '—';
          if (street !== last.manStreet) { els.maneuverStreet.textContent = street; last.manStreet = street; }
          const icon = step.icon;
          if (icon !== last.manIcon) { els.maneuverIcon.textContent = icon; last.manIcon = icon; }
        }
      }
    }

    // Trip info overlay
    if (state.mode === 'trip-info' && state.route) {
      const rem = computeRemaining();
      const dTxt = formatDistance(rem.meters);
      if (dTxt !== last.tripDist) { els.tripDist.textContent = dTxt; last.tripDist = dTxt; }
      const tTxt = formatTime(rem.seconds);
      if (tTxt !== last.tripTime) { els.tripTime.textContent = tTxt; last.tripTime = tTxt; }
      const dest = state.route.destination.label || 'Destination';
      if (dest !== last.tripDest) { els.tripDest.textContent = dest; last.tripDest = dest; }
    }
  }

  // ===== Mode switching =====
  function setMode(m) {
    state.mode = m;
    els.maneuver.classList.toggle('hidden', m !== 'navigating');

    // Show/hide overlays
    els.searchOverlay.classList.toggle('hidden', m !== 'searching');
    els.resultsOverlay.classList.toggle('hidden', m !== 'picking');
    els.tripOverlay.classList.toggle('hidden', m !== 'trip-info');
    els.hud.classList.toggle('hidden', !(m === 'idle' || m === 'navigating'));

    // Default focus per mode
    if (m === 'idle') {
      els.searchBtn.focus();
    } else if (m === 'navigating') {
      els.maneuver.focus();
    } else if (m === 'searching') {
      const firstKey = els.keyboard.querySelector('[data-key="q"]') ||
                       els.keyboard.querySelector('.key');
      if (firstKey) firstKey.focus();
      els.caret.classList.remove('hidden');
    } else if (m === 'picking') {
      const first = els.resultsList.querySelector('.result-item');
      if (first) first.focus();
    } else if (m === 'trip-info') {
      els.resumeBtn.focus();
    }
    if (m !== 'searching') els.caret.classList.add('hidden');
    scheduleRender();
  }

  // ===== Geolocation =====
  function onPosition(pos) {
    const t = pos.timestamp || Date.now();
    const { latitude, longitude, speed } = pos.coords;
    state.lat = latitude; state.lon = longitude;

    let newSpeed;
    if (speed != null && !isNaN(speed) && speed >= 0) newSpeed = speed;
    else if (lastPos) {
      const dt = (t - lastPos.t) / 1000;
      const d = haversine(lastPos.lat, lastPos.lon, latitude, longitude);
      newSpeed = dt > 0 ? d / dt : state.speed;
    } else newSpeed = 0;
    state.rawSpeed = newSpeed;
    state.speed = state.speed * 0.55 + newSpeed * 0.45;

    lastPos = { lat: latitude, lon: longitude, t };

    // Update nav progress if navigating
    if (state.mode === 'navigating' && state.route) updateNavProgress();

    scheduleRender();
    maybeQueryOSM();
  }
  function onPositionError(err) {
    console.warn('Geolocation error:', err.code, err.message);
    if (err.code === 1) showError('Location permission denied. Enable it in glasses settings, then restart.');
    else if (err.code === 2) showError('Location unavailable. Check phone GPS signal.');
  }

  // ===== Overpass speed limit (kept; signal/stop logic removed) =====
  async function maybeQueryOSM() {
    if (state.lat == null) return;
    const now = Date.now();
    const moved = state.lastOSMLat == null ? Infinity
      : haversine(state.lat, state.lon, state.lastOSMLat, state.lastOSMLon);
    if (now - state.lastOSMt < 8000 && moved < 25) return;
    state.lastOSMt = now;
    state.lastOSMLat = state.lat; state.lastOSMLon = state.lon;

    const q =
      `[out:json][timeout:6];
       way(around:25,${state.lat},${state.lon})["highway"]["maxspeed"];
       out tags center;`;
    try {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 7000);
      const r = await fetch(OVERPASS, {
        method: 'POST',
        body: 'data=' + encodeURIComponent(q),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!r.ok) return;
      const data = await r.json();
      let limit = null;
      for (const el of data.elements) {
        if (el.type === 'way' && el.tags && el.tags.maxspeed) {
          const v = parseMaxspeed(el.tags.maxspeed);
          if (v != null) { limit = v; break; }
        }
      }
      state.speedLimit = limit;
      scheduleRender();
    } catch (e) { console.warn('Overpass:', e.message || e); }
  }
  function parseMaxspeed(raw) {
    const m = String(raw).match(/(\d+)\s*(mph|km\/h)?/i);
    if (!m) return null;
    const v = parseInt(m[1], 10);
    const unit = (m[2] || '').toLowerCase();
    if (unit === 'km/h') return Math.round(v * 0.621371);
    return v;
  }

  // ===== Keyboard generation =====
  // 10-col grid. Rows: numbers, qwerty, asdfgh+, zxcvbn+, action row.
  const KEY_ROWS = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l','.'],
    ['z','x','c','v','b','n','m',',','-','/'],
    [
      { label: 'SPACE', val: ' ', cls: 'span-4 action' },
      { label: '⌫', val: 'BACK', cls: 'span-2 action' },
      { label: 'GO', val: 'GO', cls: 'span-2 action go' },
      { label: '✕', val: 'CANCEL', cls: 'span-2 action' },
    ],
  ];
  function buildKeyboard() {
    els.keyboard.innerHTML = '';
    let rowIdx = 0;
    for (const row of KEY_ROWS) {
      let colIdx = 0;
      for (const k of row) {
        const btn = document.createElement('button');
        btn.className = 'key';
        const isObj = typeof k === 'object';
        const label = isObj ? k.label : k.toUpperCase();
        const val = isObj ? k.val : k;
        btn.textContent = label;
        btn.dataset.key = val;
        btn.dataset.row = rowIdx;
        btn.dataset.col = colIdx;
        if (isObj && k.cls) btn.className += ' ' + k.cls;
        btn.addEventListener('click', () => onKeyPress(val));
        els.keyboard.appendChild(btn);
        colIdx += isObj ? (k.cls.includes('span-4') ? 4 : k.cls.includes('span-2') ? 2 : 1) : 1;
      }
      rowIdx++;
    }
  }

  function onKeyPress(val) {
    if (val === 'BACK') {
      state.query = state.query.slice(0, -1);
      updateSearchDisplay();
    } else if (val === 'CANCEL') {
      state.query = '';
      updateSearchDisplay();
      setMode(state.route ? 'navigating' : 'idle');
    } else if (val === 'GO') {
      if (state.query.trim().length > 0) submitSearch();
    } else {
      if (state.query.length < 80) {
        state.query += val;
        updateSearchDisplay();
      }
    }
  }

  function updateSearchDisplay() {
    if (state.query.length === 0) {
      els.searchText.textContent = 'Enter address';
      els.searchInput.classList.add('empty');
    } else {
      els.searchText.textContent = state.query;
      els.searchInput.classList.remove('empty');
    }
  }

  // ===== Nominatim search =====
  async function submitSearch() {
    setStatus(els.resultsList, 'Searching...', 'Looking up your destination.');
    els.resultsTitle.textContent = '"' + state.query.toUpperCase() + '"';
    setMode('picking');

    try {
      const params = new URLSearchParams({
        q: state.query,
        format: 'jsonv2',
        addressdetails: '1',
        limit: '6',
      });
      // Bias to current location if available
      if (state.lat != null) {
        // Build a ~50km viewbox around user for better local results
        const d = 0.5;
        params.set('viewbox', `${state.lon - d},${state.lat + d},${state.lon + d},${state.lat - d}`);
        params.set('bounded', '0');
      }
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 9000);
      const r = await fetch(NOMINATIM + '?' + params.toString(), {
        headers: { 'Accept': 'application/json' },
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      state.results = data;
      renderResults(data);
    } catch (e) {
      console.warn('Nominatim failed:', e);
      setStatus(els.resultsList, 'Search failed',
        'Check your connection and try again.');
    }
  }

  function setStatus(container, title, sub) {
    container.innerHTML =
      '<div class="status"><div class="status-title">' + title + '</div>' +
      '<div class="status-sub">' + sub + '</div></div>';
  }

  function renderResults(results) {
    els.resultsList.innerHTML = '';
    if (!results || results.length === 0) {
      setStatus(els.resultsList, 'No results',
        'Try a more specific address or include a city.');
      return;
    }
    for (let i = 0; i < results.length; i++) {
      const r = results[i];
      const btn = document.createElement('button');
      btn.className = 'result-item';
      const name = r.name || (r.display_name || '').split(',')[0] || 'Unknown';
      const addr = r.display_name || '';
      btn.innerHTML =
        '<div class="result-name">' + escapeHtml(name) + '</div>' +
        '<div class="result-addr">' + escapeHtml(addr) + '</div>';
      btn.addEventListener('click', () => selectResult(r));
      els.resultsList.appendChild(btn);
    }
    const first = els.resultsList.querySelector('.result-item');
    if (first) first.focus();
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  // ===== OSRM routing =====
  // Returns true if route built and applied, false on failure.
  async function fetchAndApplyRoute(fromLat, fromLon, toLat, toLon, label) {
    const url = `${OSRM}/${fromLon},${fromLat};${toLon},${toLat}` +
      '?overview=simplified&geometries=geojson&steps=true&annotations=false';
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 10000);
    try {
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(to);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.routes || !data.routes.length) return false;
      const route = data.routes[0];
      const steps = [];
      for (const leg of route.legs) {
        for (const s of leg.steps) {
          steps.push({
            lat: s.maneuver.location[1],
            lon: s.maneuver.location[0],
            type: s.maneuver.type,
            modifier: s.maneuver.modifier || '',
            distanceM: s.distance,
            durationS: s.duration,
            remainingMeters: s.distance,
            streetName: s.name || (s.ref || ''),
            icon: maneuverIcon(s.maneuver.type, s.maneuver.modifier),
          });
        }
      }
      state.route = {
        steps,
        coordinates: (route.geometry && route.geometry.coordinates) || [],
        destination: { lat: toLat, lon: toLon, label: label || (state.route && state.route.destination.label) || 'Destination' },
        totalMeters: route.distance,
        totalSeconds: route.duration,
      };
      state.stepIdx = 0;
      state.offRouteCount = 0;
      return true;
    } catch (e) {
      clearTimeout(to);
      console.warn('OSRM failed:', e);
      return false;
    }
  }

  async function selectResult(r) {
    const destLat = parseFloat(r.lat);
    const destLon = parseFloat(r.lon);
    const label = (r.display_name || '').split(',')[0] || 'Destination';

    if (state.lat == null) {
      setStatus(els.resultsList, 'No location yet',
        'Waiting for a GPS fix. Try again in a moment.');
      return;
    }
    setStatus(els.resultsList, 'Routing...', 'Building turn-by-turn directions.');

    const ok = await fetchAndApplyRoute(state.lat, state.lon, destLat, destLon, label);
    if (!ok) {
      setStatus(els.resultsList, 'No route',
        'Couldn\u2019t build a route to that destination.');
      return;
    }
    setMode('navigating');
    updateNavProgress();
  }

  // ===== Reroute when off-route =====
  async function reroute() {
    if (!state.route || state.rerouting || state.lat == null) return;
    state.rerouting = true;
    scheduleRender();
    const dest = state.route.destination;
    const ok = await fetchAndApplyRoute(state.lat, state.lon, dest.lat, dest.lon, dest.label);
    state.rerouting = false;
    if (!ok) {
      // Soft-fail: keep old route, reset counter so we don't hammer the API
      state.offRouteCount = 0;
    }
    scheduleRender();
  }

  // Map OSRM maneuver to a simple unicode arrow
  function maneuverIcon(type, modifier) {
    if (type === 'depart') return '↑';
    if (type === 'arrive') return '⦿';
    if (type === 'roundabout' || type === 'rotary') return '⟲';
    if (type === 'merge' || type === 'fork' || type === 'on ramp') {
      if (modifier && modifier.includes('left')) return '↖';
      if (modifier && modifier.includes('right')) return '↗';
      return '↑';
    }
    // turn, end of road, continue, new name, etc.
    switch (modifier) {
      case 'left':         return '↰';
      case 'right':        return '↱';
      case 'slight left':  return '↖';
      case 'slight right': return '↗';
      case 'sharp left':   return '↙';
      case 'sharp right':  return '↘';
      case 'uturn':        return '⮌';
      case 'straight':     return '↑';
      default: return '↑';
    }
  }

  // ===== Nav progress: advance step when user passes the maneuver point =====
  function updateNavProgress() {
    if (!state.route) return;
    if (state.rerouting) return; // skip checks during reroute

    const steps = state.route.steps;
    if (state.stepIdx >= steps.length) return;

    // Off-route detection: distance from user to the route polyline.
    // 3 consecutive samples > 60m triggers a reroute. Cheap: ~50-300 segments,
    // checked on each GPS fix (~1Hz).
    if (state.route.coordinates && state.route.coordinates.length > 1) {
      const offDist = pointToRouteDist(state.lat, state.lon, state.route.coordinates);
      if (offDist > 60) {
        state.offRouteCount++;
        if (state.offRouteCount >= 3) {
          reroute();
          return;
        }
      } else {
        state.offRouteCount = 0;
      }
    }

    // Distance to next maneuver point (start of NEXT step, i.e. where you turn)
    const nextStep = steps[state.stepIdx + 1] || steps[steps.length - 1];
    const d = haversine(state.lat, state.lon, nextStep.lat, nextStep.lon);

    if (d < 20 && state.stepIdx + 1 < steps.length) {
      state.stepIdx++;
      const after = steps[state.stepIdx + 1] || steps[steps.length - 1];
      steps[state.stepIdx].remainingMeters =
        haversine(state.lat, state.lon, after.lat, after.lon);
    } else {
      steps[state.stepIdx].remainingMeters = d;
    }

    // Arrived
    if (state.stepIdx === steps.length - 1) {
      const dest = state.route.destination;
      const dDest = haversine(state.lat, state.lon, dest.lat, dest.lon);
      if (dDest < 30) {
        steps[state.stepIdx].icon = '⦿';
        steps[state.stepIdx].streetName = dest.label || 'Arrived';
        steps[state.stepIdx].remainingMeters = 0;
        setTimeout(() => {
          state.route = null;
          state.stepIdx = 0;
          if (state.mode === 'navigating' || state.mode === 'trip-info') setMode('idle');
        }, 6000);
      }
    }
  }

  // ===== Error display =====
  function showError(msg) {
    els.hud.classList.add('hidden');
    els.searchOverlay.classList.add('hidden');
    els.resultsOverlay.classList.add('hidden');
    els.gate.classList.remove('hidden');
    els.gate.classList.add('error');
    els.gate.querySelector('h1').textContent = "Can't start";
    els.gate.querySelector('p').textContent = msg;
    els.startBtn.textContent = 'Retry';
    els.startBtn.focus();
  }

  // ===== Start =====
  let watchId = null;
  async function start() {
    els.gate.classList.add('hidden');
    els.gate.classList.remove('error');
    els.gate.querySelector('h1').textContent = 'Drive HUD';

    if (!('geolocation' in navigator)) {
      showError('This device does not expose geolocation to web apps.');
      return;
    }
    if (watchId != null) navigator.geolocation.clearWatch(watchId);
    watchId = navigator.geolocation.watchPosition(
      onPosition, onPositionError,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 1000 }
    );

    buildKeyboard();
    setMode('idle');
    scheduleRender();
  }

  // ===== Button bindings =====
  els.startBtn.addEventListener('click', start);
  els.searchBtn.addEventListener('click', () => setMode('searching'));
  els.cancelBtn.addEventListener('click', () => {
    state.query = '';
    updateSearchDisplay();
    setMode(state.route ? 'navigating' : 'idle');
  });
  els.resultsBackBtn.addEventListener('click', () => setMode('searching'));
  els.maneuver.addEventListener('click', () => {
    if (state.route) setMode('trip-info');
  });
  els.resumeBtn.addEventListener('click', () => setMode('navigating'));
  els.endRouteBtn.addEventListener('click', () => {
    state.route = null;
    state.stepIdx = 0;
    state.offRouteCount = 0;
    state.rerouting = false;
    setMode('idle');
  });

  // ===== D-pad input handling =====
  function focusables() {
    if (state.mode === 'searching') {
      return Array.from(document.querySelectorAll('#searchOverlay .key, #searchOverlay .small-btn'));
    }
    if (state.mode === 'picking') {
      return Array.from(document.querySelectorAll('#resultsOverlay .result-item, #resultsOverlay .small-btn'));
    }
    if (state.mode === 'trip-info') {
      return [els.endRouteBtn, els.resumeBtn];
    }
    if (state.mode === 'navigating') {
      return [els.maneuver, els.searchBtn];
    }
    if (state.mode === 'idle') {
      return [els.searchBtn];
    }
    return [];
  }

  function moveFocus(dir) {
    const els_ = focusables();
    if (els_.length === 0) return;
    const cur = document.activeElement;
    if (!els_.includes(cur)) { els_[0].focus(); return; }
    if (els_.length === 1) return;

    const curRect = cur.getBoundingClientRect();
    const cx = curRect.left + curRect.width/2;
    const cy = curRect.top + curRect.height/2;

    let best = null, bestScore = Infinity;
    for (const el of els_) {
      if (el === cur) continue;
      const r = el.getBoundingClientRect();
      const ex = r.left + r.width/2;
      const ey = r.top + r.height/2;
      const dx = ex - cx, dy = ey - cy;
      let primary, secondary;
      if (dir === 'right') { if (dx <= 1) continue; primary = dx; secondary = Math.abs(dy); }
      else if (dir === 'left') { if (dx >= -1) continue; primary = -dx; secondary = Math.abs(dy); }
      else if (dir === 'down') { if (dy <= 1) continue; primary = dy; secondary = Math.abs(dx); }
      else { if (dy >= -1) continue; primary = -dy; secondary = Math.abs(dx); }
      // Weight: prefer same-axis alignment (secondary low)
      const score = primary + secondary * 2;
      if (score < bestScore) { bestScore = score; best = el; }
    }
    // Fallback: in same row if Left/Right at edge, wrap
    if (!best && (dir === 'left' || dir === 'right')) {
      const sameRow = els_.filter(el => {
        const r = el.getBoundingClientRect();
        return Math.abs((r.top + r.height/2) - cy) < curRect.height/2;
      }).sort((a,b) => a.getBoundingClientRect().left - b.getBoundingClientRect().left);
      if (sameRow.length > 1) {
        const i = sameRow.indexOf(cur);
        if (i !== -1) best = sameRow[dir === 'right' ? (i + 1) % sameRow.length
                                                    : (i - 1 + sameRow.length) % sameRow.length];
      }
    }
    if (best) best.focus();
  }

  document.addEventListener('keydown', e => {
    // Pre-start: gate
    if (!els.gate.classList.contains('hidden')) {
      if (e.key === 'Enter') { e.preventDefault(); start(); }
      return;
    }
    switch (e.key) {
      case 'ArrowUp':    moveFocus('up');    e.preventDefault(); break;
      case 'ArrowDown':  moveFocus('down');  e.preventDefault(); break;
      case 'ArrowLeft':  moveFocus('left');  e.preventDefault(); break;
      case 'ArrowRight': moveFocus('right'); e.preventDefault(); break;
      case 'Enter':
        if (document.activeElement && document.activeElement.click) {
          document.activeElement.click();
          e.preventDefault();
        }
        break;
      case 'Escape':
        if (state.mode === 'searching') els.cancelBtn.click();
        else if (state.mode === 'picking') els.resultsBackBtn.click();
        else if (state.mode === 'trip-info') els.resumeBtn.click();
        e.preventDefault();
        break;
    }
  });

  window.addEventListener('load', () => els.startBtn.focus());

  // Re-render twice a second so live distance counts down between GPS fixes
  setInterval(() => {
    if ((state.mode === 'navigating' || state.mode === 'trip-info') &&
        state.route && state.lat != null) {
      updateNavProgress();
      scheduleRender();
    }
  }, 500);
})();
</script>
</body>
</html>
